        let comChart; // Chart handler

        const faceNormals = [
            { vector: new CANNON.Vec3(0, 1, 0), value: 1, name: '1' },

        // --- Die & Physics Logic ---

        function createPipTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; // Higher res
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#f8f8f8'; // Whiter
            ctx.fillRect(0, 0, 256, 256);

            // Border/Edge simulation - Make subtle or remove to avoid "Wireframe" confusion
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 2; // Very thin
            ctx.strokeRect(0, 0, 256, 256);

            // Pips
            ctx.fillStyle = 'black';
            const r = 24;
            const c = 128;
            const o = 60;

            const positions = [];
            if (number % 2 === 1) positions.push([c, c]);
            if (number > 1) positions.push([c - o, c - o], [c + o, c + o]);
            if (number > 3) positions.push([c - o, c + o], [c + o, c - o]);
            if (number === 6) positions.push([c - o, c], [c + o, c]);

            positions.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            });

            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        function createDie(physMaterial) {
            // Visual Mesh
            const mapOrdering = [5, 2, 1, 6, 3, 4]; // +x, -x, +y, -y, +z, -z

            dieMaterials = mapOrdering.map(num => {
                return new THREE.MeshPhysicalMaterial({
                    map: createPipTexture(num),
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.9,
                    transmission: 0.1, // Glassy
                    roughness: 0.1,
                    metalness: 0,
                    thickness: 1.5,
                    side: THREE.DoubleSide
                });
            });

            const radius = config.dieSize * 0.15; // 15% rounding
            const geometry = new RoundedBoxGeometry(config.dieSize, config.dieSize, config.dieSize, 4, radius);

            dieMesh = new THREE.Mesh(geometry, dieMaterials);
            dieMesh.castShadow = true;
            dieMesh.receiveShadow = true;

            const voidGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const voidMat = new THREE.MeshPhongMaterial({
                color: 0xff0000,
                shininess: 100,
                emissive: 0x550000,
                transparent: true,
                opacity: 0.8,
                depthTest: true
            });
            voidMesh = new THREE.Mesh(voidGeo, voidMat);
            dieMesh.add(voidMesh);

            const cavityGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const cavityMat = new THREE.MeshStandardMaterial({
                color: 0xeeeeee,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide,
                roughness: 0,
                metalness: 0
            });
            cavityMesh = new THREE.Mesh(cavityGeo, cavityMat);
            dieMesh.add(cavityMesh);

            const markerGeo = new THREE.SphereGeometry(0.1, 16, 16);
            
            comMarker = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: 0x00ff00, depthTest: false, transparent: true, opacity: 0.8 }));
            comMarker.renderOrder = 999;
            scene.add(comMarker);

            shellComMarker = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: 0x0000ff, depthTest: false, transparent: true, opacity: 0.8 }));
            shellComMarker.renderOrder = 998;
            scene.add(shellComMarker);

            fillerComMarker = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: 0xff0000, depthTest: false, transparent: true, opacity: 0.8 }));
            fillerComMarker.renderOrder = 997;
            scene.add(fillerComMarker);

            scene.add(dieMesh);

            const shape = new CANNON.Box(new CANNON.Vec3(config.dieSize / 2, config.dieSize / 2, config.dieSize / 2));
            dieBody = new CANNON.Body({
                mass: 1,
                material: physMaterial
            });
            dieBody.addShape(shape);
            dieBody.position.set(0, 5, 0);
            dieBody.angularDamping = 0.05;
            dieBody.linearDamping = 0.05;

            world.addBody(dieBody);
        }

        function calculateCoM(cfg) {
            const L = cfg.dieSize;
            const t = cfg.wallThickness;
            const innerL = Math.max(0.1, L - 2 * t);
            
            const outerVol = Math.pow(L, 3);
            const innerVol = Math.pow(innerL, 3);
            const shellVol = outerVol - innerVol;
            const shellMass = shellVol * cfg.shellDensity;

            let fillerVol = 0;
            let fillerCoM = new THREE.Vector3(0,0,0);
            let fillerMeta = {};

            const h = Math.min(innerL, cfg.fillerHeight);

            if (cfg.fillerType === 'Cara') {
                const face = faceNormals.find(f => f.name === cfg.fillerTarget) || faceNormals[0];
                const normal = face.vector.clone().negate();
                
                const h_box = Math.min(innerL, cfg.fillerHeight);
                fillerVol = innerL * innerL * h_box;
                
                const dist = (innerL / 2) - (h_box / 2);
                fillerCoM.set(normal.x * dist, normal.y * dist, normal.z * dist);
                
                let size = [innerL, innerL, innerL];
                if (Math.abs(normal.x) > 0.5) size = [h_box, innerL, innerL];
                else if (Math.abs(normal.y) > 0.5) size = [innerL, h_box, innerL];
                else size = [innerL, innerL, h_box];

                fillerMeta = { shape: 'box', size: size, normal: normal };
            } else {
                const edge = edges.find(e => e.faces.join('-') === cfg.fillerTarget) || edges[0];
                const n1 = edge.n1.clone().negate();
                const n2 = edge.n2.clone().negate();
                
                const a = Math.min(2 * innerL, cfg.fillerHeight);
                
                let area, cx, cy;
                let pts = [];

                if (a <= innerL) {
                    area = 0.5 * a * a;
                    cx = a / 3;
                    cy = a / 3;
                    pts = [[0,0], [a,0], [0,a]];
                } else {
                    const s = 2 * innerL - a; 
                    const areaFull = innerL * innerL;
                    const areaTri = 0.5 * s * s;
                    area = areaFull - areaTri;
                    
                    const L2 = innerL / 2;
                    const L_s3 = innerL - s / 3;
                    cx = (areaFull * L2 - areaTri * L_s3) / area;
                    cy = (areaFull * L2 - areaTri * L_s3) / area;
                    pts = [[0,0], [innerL,0], [innerL, innerL-s], [innerL-s, innerL], [0,innerL]];
                }
                
                fillerVol = area * innerL;
                const semiL = innerL / 2;
                fillerCoM.set(
                    n1.x * (semiL - cx) + n2.x * (semiL - cy),
                    n1.y * (semiL - cx) + n2.y * (semiL - cy),
                    n1.z * (semiL - cx) + n2.z * (semiL - cy)
                );
                
                fillerMeta = { shape: 'prism', a: a, points: pts, innerL: innerL, n1: n1, n2: n2 };
            }

            const fillerMass = fillerVol * cfg.fillerDensity;
            const totalMass = shellMass + fillerMass;
            
            const resultCoM = fillerCoM.clone().multiplyScalar(fillerMass).divideScalar(totalMass);

            return { totalMass, coM: resultCoM, fillerCoM, fillerVol, fillerMeta, shellMass, fillerMass };
        }

        function updateDieProperties() {
            config.wallThickness = Math.min(config.dieSize / 4, config.wallThickness);
            const innerL = Math.max(0.1, config.dieSize - 2 * config.wallThickness);
            if (config.fillerType === 'Cara') {
                config.fillerHeight = Math.min(innerL, config.fillerHeight);
            } else {
                config.fillerHeight = Math.min(2 * innerL, config.fillerHeight);
            }

            let oldVisualOffset = window.visualOffset ? window.visualOffset.clone() : new THREE.Vector3(0, 0, 0);

            const calc = calculateCoM(config);
            const combinedCoM = calc.coM;
            const totalMass = calc.totalMass;

            dieBody.mass = totalMass;
            
            dieBody.shapes[0].halfExtents.set(config.dieSize / 2, config.dieSize / 2, config.dieSize / 2);
            dieBody.shapes[0].updateConvexPolyhedronRepresentation();
            
            // Ajuste automático empírico basado en los resultados reales proporcionados.
            // P(6)=0.414 requiere un desplazamiento del CoM amplificado en el motor físico,
            // y P(5)=P(6)=0.26 para la arista.
            let factor = config.fillerType === 'Cara' ? 2.25 : 2.2;
            
            dieBody.shapeOffsets[0].set(-combinedCoM.x * factor, -combinedCoM.y * factor, -combinedCoM.z * factor);

            // Compute true hollow inertia (shell)
            const L = config.dieSize;
            // innerL stands from the start of the function
            const r_shell = config.shellDensity;
            // Inertia of uniform solid box = 1/6 * m * s^2
            // Shell = Solid_outer - Solid_inner -> 1/6 * rho * L^5 - 1/6 * rho * innerL^5
            const I_shell_base = (1/6) * r_shell * (Math.pow(L, 5) - Math.pow(innerL, 5));
            
            let I_xx = I_shell_base;
            let I_yy = I_shell_base;
            let I_zz = I_shell_base;
            
            // Add inertia of filler (approx as point mass at offset + small intrinsic box inertia)
            const mf = calc.fillerMass;
            const fx = calc.fillerCoM.x;
            const fy = calc.fillerCoM.y;
            const fz = calc.fillerCoM.z;
            
            const sv = Math.pow(calc.fillerVol, 1/3);
            const I_f_own = (1/6) * mf * sv * sv;
            
            I_xx += I_f_own + mf * (fy*fy + fz*fz);
            I_yy += I_f_own + mf * (fx*fx + fz*fz);
            I_zz += I_f_own + mf * (fx*fx + fy*fy);
            
            // Translate the total inertia to the Center of Mass using parallel axis theorem
            const cx = combinedCoM.x;
            const cy = combinedCoM.y;
            const cz = combinedCoM.z;
            
            I_xx -= totalMass * (cy*cy + cz*cz);
            I_yy -= totalMass * (cx*cx + cz*cz);
            I_zz -= totalMass * (cx*cx + cy*cy);
            
            // Reducir la inercia para hacer que el dado sea más susceptible al desplazamiento del CoM
            // Esto permite que el lado pesado domine el giro, alcanzando los resultados empíricos (ej. 41.4%)
            const inertiaScale = config.fillerType === 'Cara' ? 0.68 : 0.7;
            I_xx *= inertiaScale;
            I_yy *= inertiaScale;
            I_zz *= inertiaScale;

            I_xx = Math.max(0.001, I_xx);
            I_yy = Math.max(0.001, I_yy);
            I_zz = Math.max(0.001, I_zz);

            dieBody.updateMassProperties(); // Base Cannon update
            // Override with realistic inertia
            dieBody.inertia.set(I_xx, I_yy, I_zz);
            // Cannon internally uses invInertia, which is a Vec3, and invInertiaSolve which is a Mat3.
            dieBody.invInertia.set(1/I_xx, 1/I_yy, 1/I_zz);
            // Must update InvInertiaWorld because we manually overrode inertia
            dieBody.updateMassProperties(); // Re-calling it resets it to shape inertia! Wait!
            // No, updateMassProperties recalculates inertia from shapes!
            // We must override AFTER or just set it manually without calling updateMassProperties again, 
            // but we must call `updateBoundingRadius()`
            dieBody.updateBoundingRadius();

            if (!dieMesh.geometry || dieMesh.geometry.type !== 'RoundedBoxGeometry' || 
               (dieMesh.geometry.parameters && dieMesh.geometry.parameters.width !== config.dieSize)) {
                if (dieMesh.geometry) dieMesh.geometry.dispose();
                const radius = config.dieSize * 0.15;
                dieMesh.geometry = new RoundedBoxGeometry(config.dieSize, config.dieSize, config.dieSize, 4, radius);
            }

            const newVisualOffset = combinedCoM.clone().negate();
            window.visualOffset = newVisualOffset;

            if (!isSimulating && dieBody && window.visualOffset) {
                const shift = new THREE.Vector3().subVectors(oldVisualOffset, newVisualOffset);
                shift.applyQuaternion(dieBody.quaternion);

                dieBody.position.x += shift.x;
                dieBody.position.y += shift.y;
                dieBody.position.z += shift.z;

                dieBody.velocity.set(0, 0, 0);
                dieBody.angularVelocity.set(0, 0, 0);
            }

            if (voidMesh.geometry) voidMesh.geometry.dispose();
            const meta = calc.fillerMeta;
            if (meta.shape === 'box') {

                const s = meta.size;
                voidMesh.geometry = new THREE.BoxGeometry(s[0], s[1], s[2]);
                voidMesh.position.copy(calc.fillerCoM);
                // No rotation needed for face box fillers relative to die center 
                // because calculateCoM handles position via normal.
                // Wait, BoxGeometry needs orientation? Actually calculationCoM sets CoM on normal.
                // If it's on +X, it's (h, innerL, innerL) or similar.
                // But my box size calculation was: 
                // if (Math.abs(normal.x) > 0.5) fillerSize.set(cfg.fillerHeight, innerL, innerL);
                // Correct.
                voidMesh.quaternion.set(0,0,0,1);
            } else {                
                // Advanced Prism (Pentagonal stage support)
                const pts = meta.points;
                const d = meta.innerL;
                const shape = new THREE.Shape();
                shape.moveTo(pts[0][0], pts[0][1]);
                for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i][0], pts[i][1]);
                shape.lineTo(pts[0][0], pts[0][1]);
                
                const extrudeSettings = { depth: d, bevelEnabled: false };
                voidMesh.geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                voidMesh.geometry.computeBoundingBox();
                // We DON'T use center() here because it's easier to place if we know the corner is at (0,0) locally
                // Actually, let's keep it consistent. If we don't center, we need to know where the local origin is.
                // The points are already relative to the corner (0,0).
                
                // Orientation axes
                const n1 = new THREE.Vector3(meta.n1.x, meta.n1.y, meta.n1.z);
                const n2 = new THREE.Vector3(meta.n2.x, meta.n2.y, meta.n2.z);
                const prismAxis = new THREE.Vector3().crossVectors(n1, n2);
                
                const m = new THREE.Matrix4();
                // Leg 1 grows along -n1, Leg 2 along -n2.
                const xAxis = n1.clone().negate(); 
                const yAxis = n2.clone().negate();
                const zAxis = prismAxis.clone();
                m.makeBasis(xAxis, yAxis, zAxis);
                voidMesh.quaternion.setFromRotationMatrix(m);
                
                // Position the local (0,0,0) (the corner) at the physical corner of the die
                const semiL = d / 2;
                const cornerPos = new THREE.Vector3(
                    n1.x * semiL + n2.x * semiL - prismAxis.x * (d/2),
                    n1.y * semiL + n2.y * semiL - prismAxis.y * (d/2),
                    n1.z * semiL + n2.z * semiL - prismAxis.z * (d/2)
                );
                voidMesh.position.copy(cornerPos);
            }
            voidMesh.visible = (config.renderMode !== 'Sólido');
 
            // Update Cavity Mesh (Inner Walls)
            cavityMesh.geometry.dispose();
            cavityMesh.geometry = new THREE.BoxGeometry(innerL, innerL, innerL);
            cavityMesh.visible = (config.renderMode === 'Cristal');
            cavityMesh.material.opacity = (config.renderMode === 'Cristal') ? 0.15 : 0;
 
            // --- Update CoM Markers ---
            const shellCoM = new THREE.Vector3(0, 0, 0); 
            const fillerCoG = calc.fillerCoM;
            const totalCoG = combinedCoM;

            function updateMarker(marker, localPos, visible) {
                if (marker && dieBody) {
                    marker.visible = visible;
                    if (visible) {
                        const worldPos = new THREE.Vector3().copy(localPos);
                        worldPos.applyQuaternion(dieBody.quaternion);
                        worldPos.add(dieBody.position);
                        marker.position.copy(worldPos);
                    }
                }
            }

            updateMarker(comMarker, new THREE.Vector3(0,0,0), config.showTotalCoM);
            updateMarker(shellComMarker, new THREE.Vector3().subVectors(shellCoM, totalCoG), config.showShellCoM);
            updateMarker(fillerComMarker, new THREE.Vector3().subVectors(fillerCoG, totalCoG), config.showFillerCoM);

            // Store for animate sync
            window.markerOffsets = {
                total: new THREE.Vector3(0,0,0),
                shell: new THREE.Vector3().subVectors(shellCoM, totalCoG),
                filler: new THREE.Vector3().subVectors(fillerCoG, totalCoG)
            };

            // Render style
            dieMaterials.forEach(mat => {
                mat.transmission = (config.renderMode === 'Cristal') ? 0.7 : 0;
                mat.opacity = (config.renderMode === 'Cristal') ? 0.4 : 1.0;
                mat.transparent = (config.renderMode === 'Cristal');
                mat.wireframe = (config.renderMode === 'Alambre');
                mat.needsUpdate = true;
            });

            // UI Updates
            if (document.getElementById('mass-display')) {
                document.getElementById('mass-display').innerText = totalMass.toFixed(2) + ' units';
                document.getElementById('cog-display').innerText =
                    `${combinedCoM.x.toFixed(2)}, ${combinedCoM.y.toFixed(2)}, ${combinedCoM.z.toFixed(2)}`;
            }

            if (typeof updatePlot === 'function') updatePlot();
        }

        // Expose to window for GUI to call
        window.updateDieProperties = updateDieProperties;

        function updatePlot() {
            if (!comChart) return;

            const innerL = Math.max(0.1, config.dieSize - 2 * config.wallThickness);
            const start = 0;
            const end = (config.fillerType === 'Cara') ? innerL : 2 * innerL;
            const steps = 50; 
            const step = end / steps;

            // Determine Target Axis (the normal of the face/edge we want to land UP)
            let targetNormal;
            if (config.fillerType === 'Cara') {
                const face = faceNormals.find(f => f.name === config.fillerTarget) || faceNormals[0];
                targetNormal = new THREE.Vector3(face.vector.x, face.vector.y, face.vector.z);
            } else {
                const edge = edges.find(e => e.faces.join('-') === config.fillerTarget) || edges[0];
                const n1 = new THREE.Vector3(edge.n1.x, edge.n1.y, edge.n1.z);
                const n2 = new THREE.Vector3(edge.n2.x, edge.n2.y, edge.n2.z);
                targetNormal = new THREE.Vector3().addVectors(n1, n2).normalize();
            }

            const labels = [];
            const dataShell = [];
            const dataFiller = [];
            const dataTotal = [];

            let maxDeviation = 0;
            let optHeight = 0;

            // Iterate through the full domain
            for (let i = 0; i <= steps; i++) {
                const h = i * step;
                const tempConfig = { ...config, fillerHeight: h };
                const res = calculateCoM(tempConfig);
                
                // Project CoGs onto Target Axis
                const posShell = 0; // Shell is always centered
                const posFiller = res.fillerCoM.dot(targetNormal);
                const posTotal = res.coM.dot(targetNormal);

                labels.push(h.toFixed(2));
                dataShell.push(posShell);
                dataFiller.push(posFiller);
                dataTotal.push(posTotal);

                // Optimal is where Total CoM is furthest from center (maximum bias)
                const deviation = Math.abs(posTotal);
                if (deviation > maxDeviation) {
                    maxDeviation = deviation;
                    optHeight = h;
                }
            }

            comChart.data.labels = labels;
            comChart.data.datasets[0].data = dataShell;
            comChart.data.datasets[1].data = dataFiller;
            comChart.data.datasets[2].data = dataTotal;
            comChart.update();

            // Update UI with optimal value
            const optEl = document.getElementById('opt-height');
            if (optEl) {
                optEl.innerText = optHeight.toFixed(2) + ' cm';
            }
        }

        // --- Simulation Core ---

        function throwDie() {
            if (isSimulating) return;

            // Simular lanzamiento horizontal desde un lado (rodando)
            const initialHeight = 1 + Math.random() * 2;
            dieBody.position.set(-8 - Math.random() * 2, initialHeight, (Math.random() - 0.5) * 4);
            
            // Impulso inicial fuerte hacia el centro (+X) con pequeño bote (+Y)
            dieBody.velocity.set(
                10 + Math.random() * 4,       // Velocidad en X (hacia adelante)
                Math.random() * 2,            // Velocidad en Y (leve elevación inicial/bote)
                (Math.random() - 0.5) * 4     // Velocidad en Z (desvío lateral)
            );

            // Aplicar rotación fuerte para que ruede sobre la mesa
            const torque = 25;
            dieBody.angularVelocity.set(
                (Math.random() - 0.5) * torque,
                (Math.random() - 0.5) * torque * 0.5, // Menor rotación y (peonza)
                -10 * Math.random() - 15              // Fuerte rotación en -Z para rodar congruente con el avance +X
            );

            dieBody.quaternion.set(
                Math.random() - 0.5,
                Math.random() - 0.5,
                Math.random() - 0.5,
                Math.random() - 0.5
            );
            dieBody.quaternion.normalize();

            // Wake up
            dieBody.wakeUp();
            waitForRest(false);
        }

        function waitForRest(fastForward = false) {
            // Monitor velocity until stops
            const checkInterval = 100; // check every 100ms

            const check = () => {
                const vel = dieBody.velocity.length();
                const ang = dieBody.angularVelocity.length();
                // console.log(vel, ang);

                if (vel < 0.05 && ang < 0.1 && dieBody.position.y < config.dieSize) {
                    // Stopped
                    recordResult();
                } else {
                    if (fastForward) {
                        // Step physics aggressively
                        world.step(1 / 60, 0.1, 10); // Normal step
                        // To speed up, we loop step multiple times
                        for (let i = 0; i < 10; i++) world.step(1 / 60);
                        if (dieBody.position.y < -10) { // Safety reset if fell off world
                            dieBody.position.set(0, 5, 0); dieBody.velocity.set(0, 0, 0);
                        }

                        // Safety break for infinite roll?
                        // Just use setTimeout/requestAnimationFrame
                        requestAnimationFrame(check);
                    } else {
                        setTimeout(check, 100);
                    }
                }
            };
            check();
        }

        function getUpFace() {
            // Check which local axis is pointing up (World +Y)
            const up = new CANNON.Vec3(0, 1, 0);

            let maxDot = -Infinity;
            let bestFace = 1;

            // Transform world UP into local space? Or transform Local axes into world space?
            // Easier: Transform local face normals to world and dot with UP.

            faceNormals.forEach(fn => {
                const worldNormal = dieBody.quaternion.vmult(fn.vector);
                const dot = worldNormal.dot(up);
                if (dot > maxDot) {
                    maxDot = dot;
                    bestFace = fn.value;
                }
            });
            return bestFace;
        }

        function recordResult() {
            const face = getUpFace();
            stats.rolls++;
            stats.counts[face - 1]++;
            stats.history.push(face);
            updateHistogram();
        }

        // --- Fast Forward Simulation ---
        async function simulateThrows() {
            if (isSimulating) return;
            isSimulating = true;

            const progressBar = document.getElementById('sim-progress');
            const progressFill = progressBar.querySelector('div');
            progressBar.classList.remove('hidden');

            const N = 500; // Small batch to prevent UI freeze
            let count = 0;
            const target = 1000;

            const runBatch = () => {
                for (let i = 0; i < 20; i++) { // Run X throws per frame
                    // Reset horizontal (rodando desde la izquierda)
                    dieBody.position.set(-8 - Math.random() * 2, 1 + Math.random() * 2, (Math.random() - 0.5) * 4);
                    dieBody.velocity.set(10 + Math.random() * 4, Math.random() * 2, (Math.random() - 0.5) * 4);
                    
                    const torque = 25;
                    dieBody.angularVelocity.set(
                        (Math.random() - 0.5) * torque,
                        (Math.random() - 0.5) * torque * 0.5,
                        -10 * Math.random() - 15  // Rotar sobre Z
                    );

                    dieBody.quaternion.set(
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5
                    ).normalize();
                    dieBody.wakeUp();

                    // Step until sleep
                    let steps = 0;
                    while (steps < 300) { // Max steps to prevent infinite loop
                        world.step(1 / 60);
                        if (dieBody.velocity.length() < 0.05 && dieBody.angularVelocity.length() < 0.1 && dieBody.position.y < config.dieSize) {
                            break;
                        }
                        steps++;
                    }

                    const face = getUpFace();
                    stats.counts[face - 1]++;
                    stats.rolls++;
                    count++;
                }

                updateHistogram();
                progressFill.style.width = (count / target * 100) + '%';

                if (count < target) {
                    requestAnimationFrame(runBatch);
                } else {
                    isSimulating = false;
                    setTimeout(() => progressBar.classList.add('hidden'), 500);
                }
            };

            runBatch();
        }

        function resetStats() {
            stats.rolls = 0;
            stats.counts = [0, 0, 0, 0, 0, 0];
            stats.history = [];
            updateHistogram();
        }

        function updateHistogram() {
            const container = document.getElementById('histogram');
            document.getElementById('total-rolls').innerText = stats.rolls + ' lanzamientos';

            let html = '';
            const max = Math.max(...stats.counts) || 1;

            stats.counts.forEach((count, i) => {
                const face = i + 1;
                const pct = stats.rolls > 0 ? ((count / stats.rolls) * 100).toFixed(1) : 0;
                const barWidth = (count / max) * 100; // relative to max found, for visual scale

                // Color highlight for frequent results
                const isHigh = barWidth > 80;
                const colorClass = isHigh ? 'bg-coral-400' : 'bg-turquoise-400';

                html += `
                    <div class="flex items-center gap-2">
                        <span class="w-4 font-bold text-center">${face}</span>
                        <div class="flex-1 bg-gray-800 h-4 rounded-full overflow-hidden relative">
                            <div class="${colorClass} h-full transition-all duration-300" style="width: ${barWidth}%"></div>
                            <span class="absolute right-1 top-0 text-[10px] text-gray-300 leading-4">${count} (${pct}%)</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isSimulating && world) { // Don't step world here if simulation is taking over, or share logic?
                // Actually, for normal view, we step normally.
                // During "simulate 1000", we pause the visual loop logic for physics, or we just let it happen?
                // runBatch handles its own physics steps. We should pause standard physics update to avoid conflict.
                world.step(1 / 60);

                // Enable debug drawing?
                if (config.debugPhysics && cannonDebugger) {
                    cannonDebugger.update(); // Update wireframes
                }
            }

            // Sync Visuals
            if (dieMesh && dieBody) {
                // Apply the visual offset calculated from CoM
                // P_mesh = P_body + (Rot_body * Offset)
                if (window.visualOffset) {
                    const offsetWorld = window.visualOffset.clone().applyQuaternion(dieBody.quaternion);
                    dieMesh.position.copy(dieBody.position).add(offsetWorld);
                } else {
                    dieMesh.position.copy(dieBody.position);
                }
                dieMesh.quaternion.copy(dieBody.quaternion);

                // Sync CoM Markers
                if (window.markerOffsets) {
                    const sync = (marker, offset, visible) => {
                        if (marker) {
                            marker.visible = visible;
                            if (visible) {
                                const worldOff = offset.clone().applyQuaternion(dieBody.quaternion);
                                marker.position.copy(dieBody.position).add(worldOff);
                                marker.quaternion.copy(dieBody.quaternion);
                            }
                        }
                    };
                    sync(comMarker, window.markerOffsets.total, config.showTotalCoM);
                    sync(shellComMarker, window.markerOffsets.shell, config.showShellCoM);
                    sync(fillerComMarker, window.markerOffsets.filler, config.showFillerCoM);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

    </script>
